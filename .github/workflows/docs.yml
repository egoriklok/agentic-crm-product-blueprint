name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Required files
        run: |
          test -f README.md
          test -f PRD.md
          test -f AGENTS.md
          test -f docs/IMPLEMENTATION_BLUEPRINT.md
          test -f docs/AI_SWARM_PLAYBOOK.md
          test -f docs/CLIENT_INTAKE_TEMPLATE.md
          test -f agent-swarm.manifest.json
          test -f schemas/canonical_crm.schema.json
          test -f mcp/manifest.json
      - name: Agent readiness
        run: npm run verify
