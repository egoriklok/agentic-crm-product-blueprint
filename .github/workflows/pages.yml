name: Publish landing

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "index.html"
      - "vite.config.ts"
      - "tsconfig.json"
      - "components.json"
      - "docs/MONETIZATION_PLAYBOOK.md"
      - "docs/RU_SUBAGENT_LANDING_AUDIT.md"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify blueprint and landing
        run: npm run verify

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload landing artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
